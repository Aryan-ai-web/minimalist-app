<!DOCTYPE html>
<html>
<head>
    <title>My Launcher</title>
</head>
<body>
    <h1>App Working 🚀</h1>

    <button onclick="openApp('whatsapp')">Open WhatsApp</button>

    <script>
        function openApp(app) {
            window.location.href = app + "://";
        }
    </script>
</body>
